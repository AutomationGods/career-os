services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: career_os
      POSTGRES_PASSWORD: career_os
      POSTGRES_DB: career_os
    ports: ["${POSTGRES_HOST_PORT:-55434}:5432"]
    volumes: ["postgres_data:/var/lib/postgresql/data"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U career_os -d career_os"]
      interval: 5s
      timeout: 5s
      retries: 10
  redis:
    image: redis:7
    ports: ["6379:6379"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
  hermes:
    image: nousresearch/hermes-agent:latest
    restart: unless-stopped
    ports: ["127.0.0.1:${HERMES_AGENT_HOST_PORT:-8642}:8642"]
    volumes: ["${HOME}/.hermes:/opt/data"]
    environment:
      HERMES_UID: ${HERMES_UID:-10000}
      HERMES_GID: ${HERMES_GID:-10000}
      API_SERVER_ENABLED: "true"
      API_SERVER_HOST: 0.0.0.0
      API_SERVER_PORT: 8642
      API_SERVER_KEY: ${HERMES_AGENT_API_KEY:?Set HERMES_AGENT_API_KEY in .env before starting Docker Compose}
      API_SERVER_MODEL_NAME: ${HERMES_AGENT_MODEL:-hermes-agent}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      GOOGLE_API_KEY: ${GOOGLE_API_KEY:-}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
    command: ["gateway", "run"]
  migrate:
    build:
      context: .
      dockerfile: Dockerfile
    command: ["npx", "prisma", "migrate", "deploy"]
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://career_os:career_os@postgres:5432/career_os?schema=public
      CAREER_OS_COMMAND_RUNTIME: prisma
    restart: "no"
  web:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      hermes:
        condition: service_started
      migrate:
        condition: service_completed_successfully
    ports: ["${WEB_HOST_PORT:-3000}:3000"]
    environment:
      NODE_ENV: production
      HOSTNAME: 0.0.0.0
      PORT: 3000
      DATABASE_URL: postgresql://career_os:career_os@postgres:5432/career_os?schema=public
      REDIS_URL: redis://redis:6379
      CAREER_OS_COMMAND_RUNTIME: prisma
      WORKOS_CLIENT_ID: ${WORKOS_CLIENT_ID:-client_placeholder}
      WORKOS_API_KEY: ${WORKOS_API_KEY:-sk_test_placeholder}
      WORKOS_COOKIE_PASSWORD: ${WORKOS_COOKIE_PASSWORD:-placeholder-cookie-password-at-least-32-chars}
      NEXT_PUBLIC_WORKOS_REDIRECT_URI: ${NEXT_PUBLIC_WORKOS_REDIRECT_URI:-http://localhost:3000/auth/callback}
      WORKOS_BASE_URL: ${WORKOS_BASE_URL:-http://localhost:3000}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      HERMES_AGENT_ENABLED: ${HERMES_AGENT_ENABLED:-true}
      HERMES_AGENT_API_BASE_URL: http://hermes:8642
      HERMES_AGENT_API_KEY: ${HERMES_AGENT_API_KEY:?Set HERMES_AGENT_API_KEY in .env before starting Docker Compose}
      HERMES_AGENT_MODEL: ${HERMES_AGENT_MODEL:-hermes-agent}
      HERMES_AGENT_TIMEOUT_MS: ${HERMES_AGENT_TIMEOUT_MS:-60000}
volumes:
  postgres_data:
